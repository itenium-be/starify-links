<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starify Links - Options</title>
    <link href="bootstrap.min.css" rel="stylesheet">
    <link href="options.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block sidebar">
                <div class="position-sticky pt-3">
                    <h5 class="px-3 mb-3">
                        Starify Links
                        <small class="ps-1 text-muted" id="versionInfo"></small>
                    </h5>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link active" href="#badgesConfig" data-bs-toggle="pill">
                                Badges Config
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#directActivation" data-bs-toggle="pill">
                                Direct Activation
                            </a>
                        </li>
                    </ul>
                    <hr class="my-3 mx-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="https://itenium.be/blog/javascript/starify-links/" target="_blank" rel="noopener noreferrer">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-journal-text me-2" viewBox="0 0 16 16">
                                    <path d="M5 10.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1-.5-.5zm0-2a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5zm0-2a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5zm0-2a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5z"/>
                                    <path d="M3 0h10a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2v-1h1v1a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1v1H1V2a2 2 0 0 1 2-2z"/>
                                    <path d="M1 5v-.5a.5.5 0 0 1 1 0V5h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1H1zm0 3v-.5a.5.5 0 0 1 1 0V8h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1H1zm0 3v-.5a.5.5 0 0 1 1 0v.5h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1H1z"/>
                                </svg>
                                Blog Post
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="https://github.com/itenium-be/github-stars-links" target="_blank" rel="noopener noreferrer">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-github me-2" viewBox="0 0 16 16">
                                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
                                </svg>
                                Source Code
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="py-4">
                    <h1 class="mb-4">Options</h1>

                    <div class="tab-content">
                        <div class="tab-pane fade show active" id="badgesConfig">
                            <h2>Badges Configuration</h2>
                            <p class="text-muted">Configure badge types and their display settings.</p>

                            <div class="card mt-3 mb-4">
                                <div class="card-body">
                                    <div class="row align-items-center">
                                        <div class="col-auto">
                                            <label for="bulkStyleChange" class="form-label mb-0">Change style for all badges:</label>
                                        </div>
                                        <div class="col-auto">
                                            <select class="form-select" id="bulkStyleChange">
                                                <option value="">-- Select a style --</option>
                                                <option value="flat">Flat</option>
                                                <option value="flat-square">Flat Square</option>
                                                <option value="plastic">Plastic</option>
                                                <option value="for-the-badge">For The Badge</option>
                                                <option value="social">Social</option>
                                            </select>
                                        </div>
                                        <div class="col-auto">
                                            <button id="applyBulkStyle" class="btn btn-info">Apply to All</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <button id="saveBtn" class="btn btn-primary">Save Settings</button>
                                <button id="resetBtn" class="btn btn-secondary">Reset to Defaults</button>
                                <span id="saveStatus" class="ms-3 text-success" style="display:none;">✓ Saved!</span>
                            </div>

                            <div class="accordion mt-4" id="badgesAccordion"></div>
                        </div>

                        <div class="tab-pane fade" id="directActivation">
                            <h2>Direct Activation</h2>
                            <p class="text-muted">Websites where badges are automatically activated.</p>

                            <div class="mb-3">
                                <button id="saveDaBtn" class="btn btn-primary">Save Settings</button>
                                <button id="resetDaBtn" class="btn btn-secondary">Reset to Defaults</button>
                                <button id="addDaSite" class="btn btn-success">Add New Site</button>
                                <span id="saveDaStatus" class="ms-3 text-success" style="display:none;">✓ Saved!</span>
                            </div>

                            <div class="accordion mt-4" id="directActivationList"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="bootstrap.bundle.min.js"></script>
    <script src="options.js"></script>
</body>
</html>
